apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: social-pr-autopilot-backend
spec:
  template:
    spec:
      containers:
        - image: us-central1-docker.pkg.dev/PROJECT_ID/agents/social-pr-autopilot-backend:latest
          env:
            - name: APP_ENV
              value: production
            - name: DEPLOY_TARGET
              value: gcp
            - name: AI_PROVIDER
              value: mistral
            - name: ALLOWED_ORIGINS
              value: https://YOUR_FRONTEND_HOST
            - name: MISTRAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: mistral-api-key
                  key: latest
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: gemini-api-key
                  key: latest
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: telegram-bot-token
                  key: latest
            - name: TELEGRAM_CHAT_ID
              valueFrom:
                secretKeyRef:
                  name: telegram-chat-id
                  key: latest
            - name: BLUESKY_HANDLE
              valueFrom:
                secretKeyRef:
                  name: bluesky-handle
                  key: latest
            - name: BLUESKY_APP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bluesky-app-password
                  key: latest
