services:
  backend:
    build: ./backend
    ports:
      - "8102:8080"
    env_file:
      - ../.env
    environment:
      APP_ENV: local
      DEPLOY_TARGET: local
      AI_PROVIDER: mistral
      ALLOWED_ORIGINS: http://localhost:3102
  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE: http://localhost:8102
    ports:
      - "3102:3000"
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8102
    depends_on:
      - backend
